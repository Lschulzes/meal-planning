name: meal-planning

services:
  postgres:
    image: postgres
    container_name: meal-planning-postgres
    environment:
      POSTGRES_DB: meal-planning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - meal-planning_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  meal-planning_postgres_data:
